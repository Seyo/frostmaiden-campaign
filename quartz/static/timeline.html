<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=EB+Garamond&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c1824;
      color: #e0f0fa;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      padding: 2rem 1.5rem 3rem;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Cinzel', serif;
      text-align: center;
      color: #7ab8d4;
      font-size: 1.4rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.2rem;
      max-width: 680px;
      margin: 0 auto 2rem;
      padding-left: 72px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      color: #4a8099;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Layout ── */
    .timeline {
      position: relative;
      max-width: 680px;
      margin: 0 auto;
      padding-left: 72px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 52px;
      top: 0; bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, transparent, #2d4a5e 4%, #2d4a5e 96%, transparent);
    }

    /* ── Session separator ── */
    .session-header {
      position: relative;
      margin: 2.2rem 0 1.4rem -52px;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: #7ab8d4;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .session-header::before,
    .session-header::after { content: ''; height: 1px; background: #2d4a5e; }
    .session-header::before { flex: 0 0 36px; }
    .session-header::after  { flex: 1; }
    .session-header a { color: inherit; text-decoration: none; }
    .session-header a:hover { color: #a0d4e8; text-decoration: underline; text-underline-offset: 3px; }

    /* ── Event ── */
    .event { position: relative; margin-bottom: 1rem; }
    .event::before {
      content: '';
      position: absolute;
      left: -22px;
      top: 1.05rem;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #2d4a5e;
      border: 2px solid #0c1824;
      transform: translateX(-50%);
      z-index: 1;
    }
    .event-card {
      background: #111f2e;
      border-left: 3px solid #2d4a5e;
      border-radius: 0 3px 3px 0;
      padding: 0.65rem 1rem;
    }
    .event-header { display: flex; align-items: baseline; gap: 0.4rem; flex-wrap: wrap; }
    .event-day { font-family: 'Cinzel', serif; font-size: 0.7rem; color: #4a8099; letter-spacing: 0.06em; white-space: nowrap; }
    .event-icon { font-size: 0.9rem; }
    .event-title { font-size: 0.95rem; font-weight: bold; color: #e0f0fa; line-height: 1.3; }
    .event-desc { font-size: 0.88rem; color: #7a9db0; line-height: 1.55; margin-top: 0.3rem; }
    .event-desc a { color: #7ab8d4; text-decoration: none; }
    .event-desc a:hover { text-decoration: underline; }
    .event-desc em { color: #a0c8dc; font-style: italic; }

    /* ── Type colours ── */
    .type-death  .event-card { border-left-color: #c0392b; }
    .type-death::before      { background: #c0392b; }
    .type-combat .event-card { border-left-color: #e67e22; }
    .type-combat::before     { background: #e67e22; }
    .type-travel .event-card { border-left-color: #2980b9; }
    .type-travel::before     { background: #2980b9; }
    .type-invest .event-card { border-left-color: #27ae60; }
    .type-invest::before     { background: #27ae60; }
    .type-social .event-card { border-left-color: #8e44ad; }
    .type-social::before     { background: #8e44ad; }
  </style>
</head>
<body>

  <h1>Kampanjens tidslinje</h1>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div>Socialt</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2980b9"></div>Resa</div>
    <div class="legend-item"><div class="legend-dot" style="background:#27ae60"></div>Utredning</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e67e22"></div>Strid</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div>Dödsfall</div>
  </div>

  <div class="timeline" id="timeline"></div>

  <script src="timeline-data.js"></script>
  <script>
    function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function withParent(html) { return html.replace(/<a /g, '<a target="_parent" '); }

    var container = document.getElementById('timeline');
    var groups = {};
    TIMELINE_SESSIONS.forEach(function(s) { groups[s.id] = []; });
    TIMELINE_EVENTS.forEach(function(e) { if (groups[e.session]) groups[e.session].push(e); });

    TIMELINE_SESSIONS.forEach(function(session) {
      var hdr = document.createElement('div');
      hdr.className = 'session-header';
      hdr.innerHTML = '<a href="../' + session.slug + '" target="_parent">' + esc(session.label) + '</a>';
      container.appendChild(hdr);

      groups[session.id].forEach(function(ev) {
        var item = document.createElement('div');
        item.className = 'event type-' + ev.type;
        item.innerHTML =
          '<div class="event-card">' +
            '<div class="event-header">' +
              '<span class="event-day">' + ev.day + '</span>' +
              '<span class="event-icon">' + ev.icon + '</span>' +
              '<span class="event-title">' + ev.title + '</span>' +
            '</div>' +
            '<div class="event-desc">' + withParent(ev.desc) + '</div>' +
          '</div>';
        container.appendChild(item);
      });
    });
  </script>
</body>
</html>
