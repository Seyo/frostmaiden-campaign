<!DOCTYPE html>
<html lang="sv" id="html-root">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=EB+Garamond&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0c1824;
      color: #e0f0fa;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1rem;
      padding: 2rem 1.5rem 3rem;
      min-height: 100vh;
    }

    h1 {
      font-family: 'Cinzel', serif;
      text-align: center;
      color: #7ab8d4;
      font-size: 1.4rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    /* ── Filter buttons ── */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .filter-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 2px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .filter-btn.all        { border-color: #4a6878; color: #7ab8d4; }
    .filter-btn.aktiv      { border-color: #27ae60; color: #27ae60; }
    .filter-btn.oklar      { border-color: #e67e22; color: #e67e22; }
    .filter-btn.klar       { border-color: #2980b9; color: #2980b9; }
    .filter-btn.misslyckad { border-color: #7f8c8d; color: #7f8c8d; }

    .filter-btn.active,
    .filter-btn.all:hover      { background: #4a6878;  color: #e0f0fa; }
    .filter-btn.aktiv.active,
    .filter-btn.aktiv:hover    { background: #27ae60;  color: #fff; }
    .filter-btn.oklar.active,
    .filter-btn.oklar:hover    { background: #e67e22;  color: #fff; }
    .filter-btn.klar.active,
    .filter-btn.klar:hover     { background: #2980b9;  color: #fff; }
    .filter-btn.misslyckad.active,
    .filter-btn.misslyckad:hover { background: #7f8c8d; color: #fff; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ── Quest card ── */
    .card {
      background: #111f2e;
      border-radius: 3px;
      border-top: 3px solid #2d4a5e;
      padding: 1rem 1.1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: opacity 0.2s;
    }

    .card.hidden { display: none; }

    .card.status-aktiv      { border-top-color: #27ae60; }
    .card.status-oklar      { border-top-color: #e67e22; }
    .card.status-klar       { border-top-color: #2980b9; }
    .card.status-misslyckad { border-top-color: #7f8c8d; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: #e0f0fa;
      line-height: 1.3;
      text-decoration: none;
    }
    a.card-title:hover { color: #7ab8d4; }

    .badge {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-aktiv      { background: rgba(39,174,96,0.2);  color: #27ae60;  border: 1px solid #27ae60; }
    .badge-oklar      { background: rgba(230,126,34,0.2); color: #e67e22;  border: 1px solid #e67e22; }
    .badge-klar       { background: rgba(41,128,185,0.2); color: #2980b9;  border: 1px solid #2980b9; }
    .badge-misslyckad { background: rgba(127,140,141,0.2);color: #7f8c8d;  border: 1px solid #7f8c8d; }

    .card-desc {
      font-size: 0.88rem;
      color: #7a9db0;
      line-height: 1.55;
    }

    .card-desc a {
      color: #7ab8d4;
      text-decoration: none;
    }
    .card-desc a:hover { text-decoration: underline; }

    .card-meta {
      font-size: 0.78rem;
      color: #4a6878;
      border-top: 1px solid #1a2e42;
      padding-top: 0.5rem;
      margin-top: auto;
      font-style: italic;
    }

    /* ── Lang toggle ── */
    #lang-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid #2d4a5e;
      color: #4a8099;
      background: transparent;
      padding: 4px 9px;
      cursor: pointer;
      z-index: 50;
    }
    #lang-btn:hover { border-color: #7ab8d4; color: #7ab8d4; }
  </style>
</head>
<body>

  <h1 id="page-title">Uppdrag &amp; rykten</h1>

  <div class="filters">
    <button class="filter-btn all active" onclick="filter('all')"           id="f-all">Alla</button>
    <button class="filter-btn aktiv"      onclick="filter('aktiv')"         id="f-aktiv">Aktiv</button>
    <button class="filter-btn oklar"      onclick="filter('oklar')"         id="f-oklar">Oklar</button>
    <button class="filter-btn klar"       onclick="filter('klar')"          id="f-klar">Klar</button>
    <button class="filter-btn misslyckad" onclick="filter('misslyckad')"    id="f-misslyckad">Misslyckad</button>
  </div>

  <div class="grid" id="quest-grid"></div>

  <button id="lang-btn" onclick="toggleLang()">EN</button>

  <script src="i18n.js"></script>
  <script src="quests-data.js"></script>
  <script>
    var lang = getLang();
    document.getElementById('html-root').lang = lang;
    document.getElementById('lang-btn').textContent    = t('lang_toggle');
    document.getElementById('page-title').textContent  = t('quests_heading');
    document.getElementById('f-all').textContent       = t('quest_filter_all');
    document.getElementById('f-aktiv').textContent     = t('quest_filter_active');
    document.getElementById('f-oklar').textContent     = t('quest_filter_unclear');
    document.getElementById('f-klar').textContent      = t('quest_filter_done');
    document.getElementById('f-misslyckad').textContent = t('quest_filter_failed');

    var BADGE_KEYS = {
      aktiv:      'quest_filter_active',
      oklar:      'quest_filter_unclear',
      klar:       'quest_filter_done',
      misslyckad: 'quest_filter_failed',
    };

    var WIKI = lang === 'en' ? '../en/' : '../';

    function processDesc(html) {
      if (lang === 'en') html = html.replace(/href="\.\.\/(?!en\/)/g, 'href="../en/');
      return html;
    }

    var grid = document.getElementById('quest-grid');
    QUESTS.forEach(function (q) {
      var title = (lang === 'en' && q.title_en) ? q.title_en : q.title;
      var desc  = (lang === 'en' && q.desc_en)  ? q.desc_en  : q.desc;
      var meta  = (lang === 'en' && q.meta_en)  ? q.meta_en  : q.meta;
      var badge = t(BADGE_KEYS[q.status] || 'quest_filter_active');

      var titleEl = q.slug
        ? '<a class="card-title" href="' + WIKI + q.slug + '" target="_parent">' + title + '</a>'
        : '<span class="card-title">' + title + '</span>';

      var card = document.createElement('div');
      card.className = 'card status-' + q.status;
      card.dataset.status = q.status;
      card.innerHTML =
        '<div class="card-header">' +
          titleEl +
          '<span class="badge badge-' + q.status + '">' + badge + '</span>' +
        '</div>' +
        '<div class="card-desc">' + processDesc(desc) + '</div>' +
        '<div class="card-meta">' + meta + '</div>';
      grid.appendChild(card);
    });

    function filter(status) {
      document.querySelectorAll('.filter-btn').forEach(function (btn) {
        btn.classList.toggle('active',
          btn.classList.contains(status) || (status === 'all' && btn.classList.contains('all')));
      });
      document.querySelectorAll('.card').forEach(function (card) {
        card.classList.toggle('hidden', status !== 'all' && card.dataset.status !== status);
      });
    }
  </script>

</body>
</html>
